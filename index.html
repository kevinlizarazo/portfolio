<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin Lizarazo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500&display=swap" rel="stylesheet">
    <script async src="https://plausible.io/js/pa-8KoSQtn9DfTQTQhNQek0r.js"></script>
    <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Archivo', sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        main {
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        h1 {
            font-size: clamp(2.5rem, 7vw, 3.25rem);
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        h2 {
            font-size: clamp(1rem, 3.5vw, 1.25rem);
            font-weight: 400;
            color: #999;
            margin-top: 0.75rem;
            letter-spacing: 0.02em;
            line-height: 1.5;
        }

        .rows {
            list-style: none;
        }

        .rows li {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            min-height: 44px;
            padding: 0.875rem 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: clamp(1rem, 3.5vw, 1.15rem);
        }

        .rows li:first-child {
            border-top: 1px solid #1a1a1a;
        }

        .label {
            color: #999;
            flex-shrink: 0;
            padding-top: 0.1em;
        }

        .value {
            text-align: right;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .value .links {
            list-style: none;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .value .links li {
            border: none;
            padding: 0;
            min-height: 0;
            font-size: inherit;
        }

        .value .links .secondary {
            color: #666;
            font-size: 0.9em;
        }

        .value .links .secondary a {
            color: #999;
        }

        a {
            color: #fff;
            text-decoration: none;
            position: relative;
            display: inline-block;
        }

        a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #fff;
            transition: width 0.3s ease;
        }

        a:hover::after,
        a:focus-visible::after {
            width: 100%;
        }

        a:focus-visible {
            outline: 2px solid #fff;
            outline-offset: 4px;
        }

        .secondary a::after {
            background: #999;
        }

        .arrow {
            font-size: 0.75em;
            margin-left: 0.35em;
            opacity: 0.5;
            display: inline-block;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        a:hover .arrow,
        a:focus-visible .arrow {
            opacity: 1;
            transform: translate(2px, -2px);
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>Kevin Lizarazo</h1>
            <h2>Software engineering · Journalism · Cybersecurity</h2>
        </header>
        <ul class="rows">
            <li>
                <span class="label">Latest</span>
                <span class="value">
                    <a href="https://econtracker.lizarazo.dev/" target="_blank" rel="noopener">The Cost of the American Dream<span class="arrow">↗</span></a>
                </span>
            </li>
            <li>
                <span class="label">Contact</span>
                <span class="value"><a href="https://forms.gle/YGgoMqVRTG4WwhGg8" target="_blank" rel="noopener">Get in touch<span class="arrow">↗</span></a></span>
            </li>
            <li>
                <span class="label">Location</span>
                <span class="value">New York City</span>
            </li>
        </ul>
    </main>
</body>
</html>
